name: Publish Electron App

on:
  push:
    branches:
      - main
      - master
  # Alternatively, you can trigger this workflow on release creation:
  # release:
  #   types: [created]

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Make & Publish App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
